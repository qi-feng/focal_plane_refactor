process_raw:
  method: sewpy
  ellipse_scale: 2.0
  simple_detection:
    gaussian_sigma: 1.2
    percentile_threshold: 99.6
    sigma_threshold: 4.0
    opening_size: 2
    min_pixels: 2
  sewpy:
    params:
      - X_IMAGE
      - Y_IMAGE
      - FLUX_ISO
      - FLUX_MAX
      - BACKGROUND
      - A_IMAGE
      - B_IMAGE
      - THETA_IMAGE
      - FLAGS
    config:
      DETECT_MINAREA: 5
      DETECT_THRESH: 2.0
      ANALYSIS_THRESH: 5.0
      FILTER: Y
      DEBLEND_NTHRESH: 32
      DEBLEND_MINCONT: 0.005

psf:
  halfwidth: 50
  zoom_halfwidth: 20
  annotate_psf: false
  single_contour_2rms: false
  contour_levels: 6
  max_match_radius: 50.0
  pix2mm: null
  vmin: null
  vmax: null
  use_catalog_shape: false
